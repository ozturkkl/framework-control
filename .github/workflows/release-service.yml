name: Build and Release Service MSI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  read-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read_version.outputs.version }}
      is_prerelease: ${{ steps.read_version.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read version
        id: read_version
        shell: bash
        run: |
          set -euo pipefail
          current=$(grep -m1 '^version\s*=' service/Cargo.toml | sed -E 's/^version\s*=\s*"([^"]+)".*/\1/')
          isPrerelease=true
          if [ "${GITHUB_REF_NAME}" = "main" ] && { [ "${GITHUB_EVENT_NAME}" = "push" ] || [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; }; then
            isPrerelease=false
          fi
          echo "version=$current" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$isPrerelease" >> "$GITHUB_OUTPUT"

  create-release:
    needs: read-version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.manage_release.outputs.should_release }}
      promoted_stable: ${{ steps.manage_release.outputs.promoted_stable }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create GitHub release
        id: manage_release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.read-version.outputs.version }}
          IS_PRERELEASE: ${{ needs.read-version.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          tag="$VERSION"
          changelogPath="CHANGELOG.md"
          defaultBody="Refer to the CHANGELOG.md for information about version $VERSION."
          body="$defaultBody"

          if [ -f "$changelogPath" ]; then
            # Extract version section from changelog
            section=$(awk "/^## $VERSION(\$| )/{flag=1; next} /^## /{flag=0} flag" "$changelogPath" || echo "")
            if [ -n "$section" ]; then
              body="$section"
            fi
          fi

          prereleaseFlag="--prerelease"
          [ "$IS_PRERELEASE" = "false" ] && prereleaseFlag="--prerelease=false --latest"

          existingIsPrerelease=$(gh release view "$tag" --json isPrerelease -q '.isPrerelease' 2>/dev/null || echo "notfound")

          if [ "$IS_PRERELEASE" = "true" ] && [ "$existingIsPrerelease" = "false" ]; then
            echo "Release $tag is already live, skipping pre-release run"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "promoted_stable=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          promotedStable=false
          if [ "$IS_PRERELEASE" = "false" ] && [ "$existingIsPrerelease" != "false" ]; then
            promotedStable=true
            # Pre-release runs create the tag before the version PR is merged;
            # re-point it at the released commit or source tarballs ship stale code.
            if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$tag" --silent 2>/dev/null; then
              gh api -X PATCH "repos/$GITHUB_REPOSITORY/git/refs/tags/$tag" -f sha="$GITHUB_SHA" -F force=true
              echo "Moved tag $tag to $GITHUB_SHA"
            fi
          fi

          if [ "$existingIsPrerelease" = "notfound" ]; then
            # Pin the tag to the triggering commit; default is branch HEAD at creation time
            targetFlag=""
            [ "$IS_PRERELEASE" = "false" ] && targetFlag="--target $GITHUB_SHA"
            gh release create "$tag" -t "Framework Control v$VERSION" -n "$body" $prereleaseFlag $targetFlag
            echo "Created release $tag"
          else
            gh release edit "$tag" -t "Framework Control v$VERSION" -n "$body" $prereleaseFlag
            echo "Updated existing release $tag"
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "promoted_stable=$promotedStable" >> "$GITHUB_OUTPUT"

  build-msi:
    needs: [read-version, create-release]
    if: needs.create-release.outputs.should_release == 'true'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: service
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            service/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('service/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install WiX Toolset
        run: choco install wixtoolset --no-progress -y

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build MSI
        run: node scripts/build-msi.mjs
        env:
          GITHUB_PAGES: "false"
          VITE_BASE: "/"
          VITE_API_BASE: ${{ secrets.VITE_API_BASE || vars.VITE_API_BASE }}
          FRAMEWORK_CONTROL_PORT: ${{ secrets.FRAMEWORK_CONTROL_PORT || vars.FRAMEWORK_CONTROL_PORT }}
          FRAMEWORK_CONTROL_ALLOWED_ORIGINS: ${{ secrets.FRAMEWORK_CONTROL_ALLOWED_ORIGINS || vars.FRAMEWORK_CONTROL_ALLOWED_ORIGINS }}
          FRAMEWORK_CONTROL_UPDATE_REPO: ${{ secrets.FRAMEWORK_CONTROL_UPDATE_REPO || vars.FRAMEWORK_CONTROL_UPDATE_REPO }}
        working-directory: web

      - name: Locate MSI
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $msi = Get-ChildItem -Path "target/wix" -Filter *.msi | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $msi) { throw "MSI not found in target/wix" }
          echo "MSI_PATH=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "STABLE_NAME=framework-control-service-x86_64.msi" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create stable-named copy for upload
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $stable = Join-Path $env:RUNNER_TEMP $env:STABLE_NAME
          Copy-Item -Path "$env:MSI_PATH" -Destination "$stable" -Force
          echo "STABLE_PATH=$stable" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Generate MSI SHA256
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $hash = (Get-FileHash "$env:STABLE_PATH" -Algorithm SHA256).Hash.ToLower()
          $shaFile = Join-Path $env:RUNNER_TEMP "msi.sha256"
          "$hash *$env:STABLE_NAME" | Out-File -FilePath $shaFile -Encoding ASCII
          echo "MSI_SHA_PATH=$shaFile" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload MSI and its SHA to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.read-version.outputs.version }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = "$env:VERSION"
          gh release upload $tag "$env:STABLE_PATH" --clobber
          gh release upload $tag "$env:MSI_SHA_PATH" --clobber

  build-linux:
    needs: [read-version, create-release]
    if: needs.create-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            service/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('service/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build Linux tarball
        run: node scripts/build-linux.mjs
        env:
          STATIC_BUILD: "true"
          GITHUB_PAGES: "false"
          VITE_BASE: "/"
          VITE_API_BASE: ${{ secrets.VITE_API_BASE || vars.VITE_API_BASE }}
          FRAMEWORK_CONTROL_PORT: ${{ secrets.FRAMEWORK_CONTROL_PORT || vars.FRAMEWORK_CONTROL_PORT }}
          FRAMEWORK_CONTROL_ALLOWED_ORIGINS: ${{ secrets.FRAMEWORK_CONTROL_ALLOWED_ORIGINS || vars.FRAMEWORK_CONTROL_ALLOWED_ORIGINS }}
          FRAMEWORK_CONTROL_UPDATE_REPO: ${{ secrets.FRAMEWORK_CONTROL_UPDATE_REPO || vars.FRAMEWORK_CONTROL_UPDATE_REPO }}
        working-directory: web

      - name: Locate tarball
        shell: bash
        env:
          VERSION: ${{ needs.read-version.outputs.version }}
        run: |
          set -euo pipefail
          tarballName="framework-control-${VERSION}-linux-x86_64.tar.gz"
          tarballPath="target/$tarballName"
          if [ ! -f "$tarballPath" ]; then
            echo "Tarball not found: $tarballPath"
            exit 1
          fi
          echo "TARBALL_PATH=$tarballPath" >> "$GITHUB_ENV"
          echo "STABLE_NAME=framework-control-service-x86_64.tar.gz" >> "$GITHUB_ENV"
          echo "Found tarball: $tarballPath"

      - name: Create stable-named copy for upload
        shell: bash
        run: |
          set -euo pipefail
          stablePath="$RUNNER_TEMP/$STABLE_NAME"
          cp "$TARBALL_PATH" "$stablePath"
          echo "STABLE_PATH=$stablePath" >> "$GITHUB_ENV"

      - name: Generate tarball SHA256
        shell: bash
        run: |
          set -euo pipefail
          hash=$(sha256sum "$STABLE_PATH" | awk '{print $1}')
          shaFile="$RUNNER_TEMP/tarball.sha256"
          echo "$hash *$STABLE_NAME" > "$shaFile"
          echo "TARBALL_SHA_PATH=$shaFile" >> "$GITHUB_ENV"

      - name: Upload tarball and its SHA to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.read-version.outputs.version }}
        run: |
          set -euo pipefail
          tag="$VERSION"
          gh release upload "$tag" "$STABLE_PATH" --clobber
          gh release upload "$tag" "$TARBALL_SHA_PATH" --clobber

  create-sha256sums:
    needs: [read-version, build-msi, build-linux]
    if: needs.build-msi.result == 'success' && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download individual SHA files and create SHA256SUMS
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.read-version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="$VERSION"

          # Download the individual SHA files
          gh release download "$tag" -p "*.sha256" -D "$RUNNER_TEMP" -R "$REPO"

          # Combine into SHA256SUMS
          cat "$RUNNER_TEMP"/*.sha256 > "$RUNNER_TEMP/SHA256SUMS"

          # Upload SHA256SUMS
          gh release upload "$tag" "$RUNNER_TEMP/SHA256SUMS" --clobber -R "$REPO"

          # Clean up individual SHA files from release
          gh release delete-asset "$tag" msi.sha256 --yes -R "$REPO" || true
          gh release delete-asset "$tag" tarball.sha256 --yes -R "$REPO" || true

          echo "Created SHA256SUMS with all hashes"

  publish-aur:
    needs: [read-version, create-release, build-linux]
    if: needs.create-release.outputs.promoted_stable == 'true' && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install tools
        run: pacman -Syu --noconfirm --needed git openssh pacman-contrib

      - name: Update PKGBUILD and generate .SRCINFO
        shell: bash
        env:
          VERSION: ${{ needs.read-version.outputs.version }}
        run: |
          set -euo pipefail
          cd aur
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          # makepkg refuses to run as root; use a throwaway build user
          useradd -m builder
          chown -R builder .
          runuser -u builder -- updpkgsums
          runuser -u builder -- makepkg --printsrcinfo > .SRCINFO

      - name: Push to AUR
        shell: bash
        env:
          VERSION: ${{ needs.read-version.outputs.version }}
          AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
          AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > "$HOME/.ssh/aur_key"
          chmod 600 "$HOME/.ssh/aur_key"
          ssh-keyscan aur.archlinux.org >> "$HOME/.ssh/known_hosts"
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/aur_key -o UserKnownHostsFile=$HOME/.ssh/known_hosts"

          git clone ssh://aur@aur.archlinux.org/framework-control.git "$RUNNER_TEMP/aur"
          cp aur/PKGBUILD aur/.SRCINFO aur/framework-control.install "$RUNNER_TEMP/aur/"

          cd "$RUNNER_TEMP/aur"
          git config user.name "$AUR_USERNAME"
          git config user.email "$AUR_EMAIL"
          git add -A
          if git diff --cached --quiet; then
            echo "AUR package already up to date"
            exit 0
          fi
          git commit -m "Update to $VERSION"
          git push origin master
